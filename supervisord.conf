[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:mysql]
command=mysqld_safe --user=mysql
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/mysql.out.log
stderr_logfile=/var/log/supervisor/mysql.err.log
priority=1

[program:apache2]
command=/usr/sbin/apache2ctl -D FOREGROUND
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/apache2.out.log
stderr_logfile=/var/log/supervisor/apache2.err.log
priority=2
environment=MYSQL_HOST="127.0.0.1",MYSQL_DATABASE="sistema_agencia",MYSQL_USER="agencia_user",MYSQL_PASSWORD="agencia_pass2026"
